name: Release Kernel Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            gcc-multilib \
            binutils \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools

      - name: Build kernel binary
        run: make all CROSS_COMPILE=

      - name: Build bootable ISO
        run: make iso CROSS_COMPILE=

      - name: Generate checksums
        run: |
          sha256sum build/kernel.bin > build/SHA256SUMS.txt
          sha256sum build/kernel.elf >> build/SHA256SUMS.txt
          sha256sum build/kernel.iso >> build/SHA256SUMS.txt

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/kernel.bin
            build/kernel.elf
            build/kernel.iso
            build/SHA256SUMS.txt
          fail_on_unmatched_files: true
