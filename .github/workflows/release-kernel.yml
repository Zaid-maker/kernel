name: Release Kernel Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to rebuild/upload assets for (defaults to latest tag)"
        required: false
        type: string
      force_rebuild:
        description: "Force rebuild/upload even if kernel/ appears unchanged"
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - Auto Tag And Release
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect kernel changes since previous tag
        id: change_check
        working-directory: .
        run: |
          set -e

          manual_tag="${{ github.event.inputs.tag_name || '' }}"
          force_rebuild="${{ github.event.inputs.force_rebuild || 'false' }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            current_tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$manual_tag" ]; then
            current_tag="$manual_tag"
          else
            current_tag="$(git tag --sort=-creatordate | head -n 1 || true)"
          fi

          if [ -z "$current_tag" ]; then
            echo "No tag found to evaluate."
            echo "kernel_changed=false" >> "$GITHUB_OUTPUT"
            echo "current_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse "refs/tags/$current_tag" >/dev/null 2>&1; then
            echo "Tag not found: $current_tag"
            exit 1
          fi

          echo "current_tag=$current_tag" >> "$GITHUB_OUTPUT"

          prev_tag="$(git tag --sort=-creatordate | grep -Fxv "$current_tag" | head -n 1 || true)"

          if [ "$force_rebuild" = "true" ]; then
            echo "force_rebuild=true requested; treating as changed."
            echo "kernel_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$prev_tag" ]; then
            echo "No previous tag found; treating as changed."
            echo "kernel_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$prev_tag" "$current_tag" -- kernel; then
            echo "No kernel/ changes between $prev_tag and $current_tag."
            echo "kernel_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "kernel/ changed between $prev_tag and $current_tag."
            echo "kernel_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip note (no kernel changes)
        if: steps.change_check.outputs.kernel_changed != 'true'
        run: echo "Skipping release asset build/upload because kernel/ did not change since previous tag."

      - name: Install dependencies
        if: steps.change_check.outputs.kernel_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            gcc-multilib \
            binutils \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools

      - name: Run host-side unit tests
        if: steps.change_check.outputs.kernel_changed == 'true'
        run: make test CROSS_COMPILE=

      - name: Build kernel binary
        if: steps.change_check.outputs.kernel_changed == 'true'
        run: make all CROSS_COMPILE= KERNEL_VERSION=${{ steps.change_check.outputs.current_tag }}

      - name: Build bootable ISO
        if: steps.change_check.outputs.kernel_changed == 'true'
        run: make iso CROSS_COMPILE= KERNEL_VERSION=${{ steps.change_check.outputs.current_tag }}

      - name: Bind upload to target tag
        if: steps.change_check.outputs.kernel_changed == 'true'
        id: release_ref
        run: |
          echo "tag=${{ steps.change_check.outputs.current_tag }}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        if: steps.change_check.outputs.kernel_changed == 'true'
        run: |
          sha256sum build/kernel.bin > build/SHA256SUMS.txt
          sha256sum build/kernel.elf >> build/SHA256SUMS.txt
          sha256sum build/kernel.iso >> build/SHA256SUMS.txt

      - name: Upload assets to GitHub Release
        if: steps.change_check.outputs.kernel_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_ref.outputs.tag }}
          files: |
            kernel/build/kernel.bin
            kernel/build/kernel.elf
            kernel/build/kernel.iso
            kernel/build/SHA256SUMS.txt
            kernel/VERSION
          fail_on_unmatched_files: true
